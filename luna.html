<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna — Casa del Árbol</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#141018;
font-family:'Crimson Pro', serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.fondo{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(163,98,255,.12), transparent 30%),
radial-gradient(circle at bottom right, rgba(255,120,200,.10), transparent 35%),
linear-gradient(to bottom,#120f18,#1d1625,#120f18);
z-index:0;
}

.container{
width:min(900px,98vw);
height:100vh;
display:flex;
flex-direction:column;
position:relative;
z-index:2;
background:rgba(18,12,24,.94);
backdrop-filter:blur(4px);
border-left:1px solid rgba(255,255,255,.08);
border-right:1px solid rgba(255,255,255,.08);
}

.header{
padding:14px 18px;
border-bottom:1px solid rgba(255,255,255,.08);
background:rgba(25,18,32,.96);
}

.header-row{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:linear-gradient(135deg,#b26cff,#ff9bd2);
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
color:#1a1022;
font-family:'Playfair Display', serif;
}

.header-info h1{
font-family:'Playfair Display', serif;
font-size:24px;
font-weight:600;
color:#f5ddff;
}

.header-sub{
font-size:12px;
letter-spacing:.08em;
text-transform:uppercase;
color:rgba(255,220,255,.55);
}

.frase{
margin-top:8px;
padding-left:12px;
border-left:2px solid rgba(255,180,255,.25);
font-style:italic;
color:rgba(255,230,255,.65);
font-size:14px;
line-height:1.5;
}

.temas{
padding:10px 15px;
display:flex;
flex-wrap:wrap;
gap:8px;
border-bottom:1px solid rgba(255,255,255,.06);
background:rgba(20,14,26,.95);
}

.tema-btn{
padding:7px 13px;
border:none;
border-radius:20px;
background:rgba(178,108,255,.12);
color:#f5dcff;
cursor:pointer;
font-family:'Crimson Pro', serif;
font-size:14px;
transition:.2s;
border:1px solid rgba(255,255,255,.08);
}

.tema-btn:hover{
background:rgba(255,155,210,.22);
}

.chat{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.mensaje{
max-width:84%;
padding:14px 16px;
line-height:1.8;
font-size:16px;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.ia{
align-self:flex-start;
background:rgba(35,22,42,.95);
border:1px solid rgba(255,255,255,.08);
border-radius:4px 14px 14px 14px;
color:#f5eaff;
}

.usuario{
align-self:flex-end;
background:rgba(25,40,28,.92);
border:1px solid rgba(180,255,180,.15);
border-radius:14px 4px 14px 14px;
color:#e8ffe8;
}

.input-area{
display:flex;
gap:10px;
padding:12px;
border-top:1px solid rgba(255,255,255,.08);
background:rgba(14,10,20,.96);
}

.input-area input{
flex:1;
padding:12px;
background:rgba(30,20,40,.9);
border:1px solid rgba(255,255,255,.08);
outline:none;
color:white;
font-family:'Crimson Pro', serif;
font-size:15px;
border-radius:4px;
}

.input-area input::placeholder{
color:rgba(255,255,255,.35);
}

.send-btn{
padding:12px 20px;
border:none;
background:#d68cff;
color:#1b1124;
font-weight:bold;
cursor:pointer;
border-radius:4px;
font-family:'Playfair Display', serif;
font-size:16px;
}

.footer{
text-align:center;
padding:6px;
font-size:11px;
color:rgba(255,255,255,.28);
background:rgba(14,10,20,.95);
}

</style>
</head>

<body>

<div class="fondo"></div>

<div class="container">

<div class="header">
<div class="header-row">

<div class="avatar">L</div>

<div class="header-info">
<h1>Luna</h1>
<div class="header-sub">Bailarina Secundaria · Casa del Árbol</div>
</div>

</div>

<div class="frase">
“La gente cree que no pongo atención… y por eso escucho absolutamente todo.”
</div>
</div>

<div class="temas">
<button class="tema-btn" onclick="preguntar('escuchaste')">👂 ¿Qué escuchaste?</button>
<button class="tema-btn" onclick="preguntar('casa')">🌳 Casa del árbol</button>
<button class="tema-btn" onclick="preguntar('tomas')">📰 Tomás</button>
<button class="tema-btn" onclick="preguntar('guantes')">🧤 Guantes</button>
<button class="tema-btn" onclick="preguntar('elias')">⚽ Elías</button>
<button class="tema-btn" onclick="preguntar('festival')">🎭 Antes del festival</button>
<button class="tema-btn" onclick="preguntar('hablar')">🗺️ ¿Con quién hablar?</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input type="text" id="pregunta" placeholder="Pregúntale algo a Luna..." onkeydown="if(event.key==='Enter') enviar()">
<button class="send-btn" onclick="enviar()">Preguntar</button>
</div>

<div class="footer">
Festival de las Luces — Investigación Narrativa
</div>

</div>

<script>

const chat = document.getElementById("chat");

const respuestas = {

escuchaste:[
`Mira, yo no estaba espiando, ¿okay? Simplemente estaba en el lugar correcto en el momento correcto. Estaba subida en la casa del árbol esperando que empezara el festival cuando escuché dos voces abajo. Hablaban bajito pero con esa urgencia que tienen las personas cuando algo se les está yendo de las manos.`,

`Lo que más me impactó no fue lo que dijeron sino cómo lo dijeron. Con un nerviosismo que yo nunca había escuchado en el festival. Normalmente todo el mundo está feliz, emocionado, cantando. Pero esas voces sonaban como si estuvieran negociando algo que sabían que estaba mal.`
],

casa:[
`Esa noche entró y salió gente de la casa del árbol que normalmente no va ahí. Y yo los conozco a todos, llevo toda la vida en este pueblo. Primero entró alguien con una chaqueta oscura y guantes negros. Y hacía calor esa noche. Eso ya era rarísimo.`,

`Vi al menos tres personas distintas pasar por la casa del árbol en menos de una hora. Ninguna se saludó entre sí aunque se cruzaron. Eso me pareció superextraño porque en el festival todo el mundo se saluda.`
],

tomas:[
`Tomás estaba rarísimo esa noche. Normalmente es súper calmado, siempre con esa cara de que ya sabe todo antes de que pase. Pero esa noche lo vi caminar rápido dos veces entre la zona central y la casa del árbol. Sin su libreta.`,

`En un momento lo vi parado solo cerca del árbol grande mirando hacia el lago con esa expresión que tienen las personas cuando están calculando algo en su cabeza. Y cuando alguien lo saludó se sobresaltó. Tomás nunca se sobresalta.`
],

guantes:[
`Eso no se me va de la cabeza. ¿Quién usa guantes negros en una noche de festival? Los guantes oscuros son para el invierno o para cuando no quieres dejar huellas en algo. Y yo no digo más porque no quiero meterme en problemas.`,

`Lo que sí puedo decirte es que esa persona con guantes era alguien del pueblo. Lo sé porque conocía el camino entre los árboles sin necesitar luz para orientarse.`
],

elias:[
`Ay, Elías. Mira, yo no tengo nada contra él personalmente, pero esa noche estaba insoportable de raro. Lo vi discutir con alguien cerca de la zona de hielo y te juro que pensé que iban a llegar a los golpes.`,

`Después de la discusión Elías desapareció como veinte minutos y cuando volvió estaba diferente. Más tranquilo, pero de esa tranquilidad falsa que tienen las personas cuando acaban de tomar una decisión y ya no hay vuelta atrás.`
],

festival:[
`Desde la tarde ya había cosas raras. Valeria estaba supernerviosa y eso no es normal en ella antes de una presentación. La vi ir y venir varias veces entre la zona de hongos y la zona central como si estuviera esperando a alguien.`,

`También noté que había personas que no son del festival ayudando a mover cosas cerca del escenario principal. Caras que yo no reconocía. Y en un pueblo pequeño como este uno reconoce todas las caras.`
],

hablar:[
`Si quieres saber qué pasó en la playa esa noche, habla con Samuel. Está ahí todos los días desde que tengo memoria. Habla raro a veces, pero siempre dice cosas importantes si lo escuchas con paciencia.`,

`Para lo del periodista, ve directo a la zona central y busca a Tomás. Y si quieres saber más de Elías, búscalo en la zona de hielo. Pero ve con preguntas concretas porque se pone muy a la defensiva.`
]

};

const usadas = {};

function agregar(texto,tipo){

const div=document.createElement("div");

div.classList.add("mensaje",tipo);

div.innerHTML=texto;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function obtener(tema){

if(!usadas[tema]) usadas[tema]=0;

const idx=usadas[tema]%respuestas[tema].length;

usadas[tema]++;

return respuestas[tema][idx];

}

function detectar(texto){

texto=texto.toLowerCase();

if(texto.match(/escuch|voz|conversaci/)) return "escuchaste";

if(texto.match(/casa|árbol|arbol/)) return "casa";

if(texto.match(/tom[aá]s|periodista/)) return "tomas";

if(texto.match(/guantes|negros|huellas/)) return "guantes";

if(texto.match(/el[ií]as|futbolista/)) return "elias";

if(texto.match(/festival|antes|valeria/)) return "festival";

if(texto.match(/hablar|preguntar|investigar|quien/)) return "hablar";

return null;

}

function preguntar(tema){

const etiquetas={

escuchaste:"¿Qué escuchaste esa noche?",

casa:"¿Qué viste en la casa del árbol?",

tomas:"¿Qué notaste del periodista?",

guantes:"¿Qué recuerdas de los guantes oscuros?",

elias:"¿Qué sabes de Elías?",

festival:"¿Qué notaste antes del festival?",

hablar:"¿Con quién debería hablar?"

};

agregar(etiquetas[tema],"usuario");

setTimeout(()=>{

agregar(obtener(tema),"ia");

},700);

}

function enviar(){

const input=document.getElementById("pregunta");

const texto=input.value.trim();

if(!texto) return;

agregar(texto,"usuario");

input.value="";

const tema=detectar(texto);

setTimeout(()=>{

if(tema){

agregar(obtener(tema),"ia");

}else{

agregar("Luna se acomoda el cabello y baja la voz. “Okay… eso sí está raro. Pero pregúntame mejor sobre lo que escuché, la casa del árbol, Tomás, Elías o las personas extrañas del festival.”","ia");

}

},700);

}

window.onload=()=>{

setTimeout(()=>{

agregar("Luna sonríe apenas te acercas. “Por fin alguien quiere investigar en serio lo que pasó esa noche. Porque créeme… demasiadas cosas raras ocurrieron antes de que desapareciera el Fragmento.”","ia");

},500);

};

</script>

</body>
</html>
