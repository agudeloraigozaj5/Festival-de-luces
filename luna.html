<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna — Control de Lectura</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#141018;
font-family:'Crimson Pro', serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.fondo{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(163,98,255,.12), transparent 30%),
radial-gradient(circle at bottom right, rgba(255,120,200,.10), transparent 35%),
linear-gradient(to bottom,#120f18,#1d1625,#120f18);
z-index:0;
}

.container{
width:min(900px,98vw);
height:100vh;
display:flex;
flex-direction:column;
position:relative;
z-index:2;
background:rgba(18,12,24,.94);
backdrop-filter:blur(4px);
border-left:1px solid rgba(255,255,255,.08);
border-right:1px solid rgba(255,255,255,.08);
}

.header{
padding:14px 18px;
border-bottom:1px solid rgba(255,255,255,.08);
background:rgba(25,18,32,.96);
}

.header-row{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:linear-gradient(135deg,#b26cff,#ff9bd2);
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
color:#1a1022;
font-family:'Playfair Display', serif;
}

.header-info h1{
font-family:'Playfair Display', serif;
font-size:24px;
font-weight:600;
color:#f5ddff;
}

.header-sub{
font-size:12px;
letter-spacing:.08em;
text-transform:uppercase;
color:rgba(255,220,255,.55);
}

.zona{
font-size:10px;
padding:4px 10px;
border:1px solid rgba(255,200,255,0.2);
border-radius:3px;
color:rgba(255,220,255,0.7);
}

.frase{
margin-top:8px;
padding-left:12px;
border-left:2px solid rgba(255,180,255,.25);
font-style:italic;
color:rgba(255,230,255,.65);
font-size:14px;
line-height:1.5;
}

.chat{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.chat::-webkit-scrollbar{
width:4px;
}

.chat::-webkit-scrollbar-thumb{
background:rgba(178,108,255,0.2);
}

.mensaje{
max-width:84%;
padding:14px 16px;
line-height:1.8;
font-size:16px;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.ia{
align-self:flex-start;
background:rgba(35,22,42,.95);
border:1px solid rgba(255,255,255,.08);
border-radius:4px 14px 14px 14px;
color:#f5eaff;
}

.usuario{
align-self:flex-end;
background:rgba(25,40,28,.92);
border:1px solid rgba(180,255,180,.15);
border-radius:14px 4px 14px 14px;
color:#e8ffe8;
}

.typing-wrap{
align-self:flex-start;
}

.typing{
display:inline-flex;
gap:5px;
padding:10px 14px;
background:rgba(35,22,42,.95);
border:1px solid rgba(255,255,255,.08);
border-radius:4px 14px 14px 14px;
}

.typing span{
width:6px;
height:6px;
border-radius:50%;
background:#b26cff;
animation:bounce .9s infinite;
}

.typing span:nth-child(2){
animation-delay:.15s;
}

.typing span:nth-child(3){
animation-delay:.3s;
}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

.input-area{
display:flex;
flex-direction:column;
gap:8px;
padding:12px;
border-top:1px solid rgba(255,255,255,.08);
background:rgba(14,10,20,.96);
}

.opciones-container {
display:grid;
grid-template-columns:1fr;
gap:8px;
width:100%;
}

@media(min-width: 600px){
  .opciones-container {
    grid-template-columns:1fr 1fr;
  }
}

.opcion-btn {
padding:12px 14px;
background:rgba(178,108,255,0.05);
border:1px solid rgba(178,108,255,0.15);
border-radius:6px;
color:#f5dcff;
font-family:'Crimson Pro', serif;
font-size:15px;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.opcion-btn:hover:not(:disabled) {
background:rgba(178,108,255,0.15);
border-color:rgba(178,108,255,0.4);
}

.opcion-btn:disabled {
opacity:0.5;
cursor:not-allowed;
}

.footer{
text-align:center;
padding:6px;
font-size:11px;
color:rgba(255,255,255,.28);
background:rgba(14,10,20,.95);
}

.progreso-barra {
height:4px;
background:rgba(178,108,255,0.1);
width:100%;
position:relative;
}

.progreso-llenado {
height:100%;
background:linear-gradient(90deg,#b26cff,#ff9bd2);
width:0%;
transition:width 0.3s ease;
}
</style>
</head>

<body>

<div class="fondo"></div>

<div class="container">

<div class="header">
<div class="header-row">
<div class="avatar">L</div>
<div class="header-info">
<h1>Luna</h1>
<div class="header-sub">Validadora de Lectura · Fase Final</div>
</div>
<div class="zona" id="estacion-tag">ESTACIÓN 1 / 2</div>
</div>
<div class="frase">
“La gente cree que no pongo atención… y por eso escucho absolutamente todo.”
</div>
</div>

<div class="progreso-barra">
<div class="progreso-llenado" id="barra"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<div class="opciones-container" id="opciones-block">
<!-- Botones inyectados dinámicamente -->
</div>
</div>

<div class="footer">
Evidencia de Lectura — "Dónde está Frank.docx"
</div>

</div>

<script>
const chat = document.getElementById("chat");
const opcionesBlock = document.getElementById("opciones-block");
const barra = document.getElementById("barra");
const estacionTag = document.getElementById("estacion-tag");

let estacionActual = 0;
let frasesRecolectadas = [];

// Banco de preguntas centrado en la segunda mitad del texto
const bancoPreguntas = [
  {
    pregunta: "Estación 1: Con el paso de las semanas, ¿qué hacía Adela todas las tardes al finalizar la jornada laboral para intentar encontrar pistas sobre el paradero de Frank?",
    opciones: [
      { inciso: "A", texto: "Iba a la zona de Chía a buscar en hospitales y estaciones de tren.", correcta: false },
      { inciso: "B", texto: "Iba a las inmediaciones del Palacio, de la Policía, de la morgue, al Cantón Norte y al Batallón Charley Solano preguntando con una fotografía.", correcta: true },
      { inciso: "C", texto: "Llamaba telefónicamente a todas las estaciones de radio del país para dar un anuncio de recompensa.", correcta: false },
      { inciso: "D", texto: "Se quedaba revisando los cuadernos escolares de religión de sus gemelos Miguel y Alex.", correcta: false }
    ],
    frasePremio: "«Con los días, con las semanas que pasaban indefectibles, cada tarde preguntaba por Frank con una foto...»"
  },
  {
    pregunta: "Estación 2: Mientras la angustia por Frank continuaba en el hogar de los Rodríguez, ¿qué suceso de impacto nacional narraba el locutor Jairo en el programa 'Fútbol y Pasión' de Radio Panamericana?",
    opciones: [
      { inciso: "A", texto: "La gran victoria del Deportivo Cali en la final de la Copa Libertadores de América.", correcta: false },
      { inciso: "B", texto: "La movilización de tropas del Ejército desde el sur de Bogotá hacia la Plaza de Bolívar.", correcta: false },
      { inciso: "C", texto: "Las desgarradoras escenas de las personas cubiertas de lodo tras el desastre natural en Armero y Cambao.", correcta: true },
      { inciso: "D", texto: "El inicio de las vacaciones de fin de año de todas las escuelas públicas del país.", correcta: false }
    ],
    frasePremio: "«...mientras las ondas radiales mezclaban la pasión del deporte con el lodo de la peor tragedia natural.»"
  }
];

function agregarMensaje(texto, tipo){
  const div = document.createElement("div");
  div.classList.add("mensaje", tipo);
  div.innerHTML = texto.replace(/\n/g, "<br>");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping(callback){
  const wrap = document.createElement("div");
  wrap.classList.add("typing-wrap");
  wrap.id = "typing";
  wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  
  setTimeout(() => {
    const t = document.getElementById("typing");
    if(t) t.remove();
    callback();
  }, 1000);
}

function cargarEstacion() {
  if (estacionActual < bancoPreguntas.length) {
    estacionTag.innerText = `ESTACIÓN ${estacionActual + 1} / 2`;
    barra.style.width = `${(estacionActual / bancoPreguntas.length) * 100}%`;
    
    const configuracion = bancoPreguntas[estacionActual];
    
    mostrarTyping(() => {
      agregarMensaje(configuracion.pregunta, "ia");
      renderizarOpciones(configuracion.opciones);
    });
  } else {
    estacionTag.innerText = "FINALIZADO";
    barra.style.width = "100%";
    opcionesBlock.innerHTML = "";
    
    mostrarTyping(() => {
      agregarMensaje("🔮 ¡Excelente! Has superado las 2 estaciones de lectura de Luna. Aquí están tus fragmentos recuperados:", "ia");
      
      let mensajeFinal = frasesRecolectadas.map((f, index) => `${index + 1}. ${f}`).join("\n\n");
      
      setTimeout(() => {
        agregarMensaje(mensajeFinal, "ia");
        setTimeout(() => {
          agregarMensaje("🔒 **COMPROBACIÓN EXITOSA:** Captura esta pantalla como evidencia de que has completado el análisis de la lectura.", "ia");
        }, 800);
      }, 500);
    });
  }
}

function renderizarOpciones(opciones) {
  opcionesBlock.innerHTML = "";
  opciones.forEach(opc => {
    const boton = document.createElement("button");
    boton.classList.add("opcion-btn");
    boton.innerHTML = `<strong>${opc.inciso}.</strong> ${opc.texto}`;
    boton.onclick = () => procesarRespuesta(opc);
    opcionesBlock.appendChild(boton);
  });
}

function procesarRespuesta(opcionSeleccionada) {
  const botones = opcionesBlock.querySelectorAll(".opcion-btn");
  botones.forEach(b => b.disabled = true);

  agregarMensaje(`Elegí la opción ${opcionSeleccionada.inciso}: ${opcionSeleccionada.texto}`, "usuario");

  const configActual = bancoPreguntas[estacionActual];

  if (opcionSeleccionada.correcta) {
    mostrarTyping(() => {
      agregarMensaje(`🟣 ¡Respuesta correcta! Luna te entrega una frase clave de la lectura:\n\n"${configActual.frasePremio}"`, "ia");
      frasesRecolectadas.push(configActual.frasePremio);
      estacionActual++;
      setTimeout(cargarEstacion, 1500);
    });
  } else {
    mostrarTyping(() => {
      agregarMensaje("❌ Mmm, eso no cuadra con lo que pasó en el libro. Recuerda bien los recorridos de Adela o los reportes de la radio. ¡Inténtalo de nuevo!", "ia");
      setTimeout(() => {
        renderizarOpciones(configActual.opciones);
      }, 1000);
    });
  }
}

window.addEventListener("load", () => {
  mostrarTyping(() => {
    agregarMensaje("¡Hola! Soy Luna. Ya que dicen que me entero de todo, te pondré a prueba con 2 estaciones clave sobre el desenlace del documento de Frank Rodríguez. Selecciona la opción correcta para avanzar.", "ia");
    setTimeout(cargarEstacion, 1500);
  });
});
</script>

</body>
</html>
