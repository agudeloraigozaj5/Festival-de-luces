<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evidencia de Lectura — El día en que Frank desapareció</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0c10;
font-family:'Crimson Pro', serif;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.luz{
position:fixed;
border-radius:50%;
pointer-events:none;
z-index:0;
animation:flotar 8s ease-in-out infinite;
}

.luz:nth-child(1){
width:240px;
height:240px;
top:-40px;
left:-30px;
background:radial-gradient(circle, rgba(255,180,120,0.12) 0%, transparent 70%);
}

.luz:nth-child(2){
width:180px;
height:180px;
bottom:-30px;
right:-20px;
background:radial-gradient(circle, rgba(120,180,255,0.08) 0%, transparent 70%);
animation-delay:3s;
}

@keyframes flotar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-18px);}
}

.container{
width:min(860px,98vw);
height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(180deg,#0f1115 0%,#161920 100%);
position:relative;
z-index:1;
}

.header{
padding:12px 18px;
background:linear-gradient(135deg,#1a202c 0%,#2d3748 100%);
border-bottom:2px solid rgba(180,210,255,0.2);
}

.header-row{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-family:'Playfair Display', serif;
font-size:18px;
font-weight:bold;
background:linear-gradient(135deg,#8ae4ff,#769eff);
color:#0f141d;
box-shadow:0 0 0 2px rgba(180,210,255,0.2);
}

.header-info{
flex:1;
}

.header-info h1{
font-family:'Playfair Display', serif;
font-size:18px;
color:#e2f1ff;
}

.header-sub{
font-size:11px;
color:rgba(200,225,255,0.65);
letter-spacing:.08em;
text-transform:uppercase;
}

.zona{
font-size:10px;
padding:4px 10px;
border:1px solid rgba(200,225,255,0.2);
border-radius:3px;
color:rgba(220,235,255,0.7);
}

.frase{
margin-top:8px;
font-style:italic;
font-size:13px;
color:rgba(220,235,255,0.6);
border-left:2px solid rgba(180,210,255,0.3);
padding-left:10px;
line-height:1.5;
}

.temas-wrap{
padding:8px 14px;
background:rgba(18,22,30,0.95);
border-bottom:1px solid rgba(180,210,255,0.1);
}

.temas-label{
font-size:10px;
text-transform:uppercase;
letter-spacing:.1em;
color:rgba(220,235,255,0.4);
margin-bottom:6px;
}

.temas{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.chat{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:14px;
}

.chat::-webkit-scrollbar{
width:4px;
}

.chat::-webkit-scrollbar-thumb{
background:rgba(180,210,255,0.2);
}

.mensaje{
max-width:84%;
padding:13px 16px;
line-height:1.8;
font-size:15px;
animation:aparecer .25s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.ia{
align-self:flex-start;
background:rgba(24,30,42,0.9);
border:1px solid rgba(180,210,255,0.12);
border-radius:3px 14px 14px 14px;
color:#e5f1ff;
}

.usuario{
align-self:flex-end;
background:rgba(20,45,28,0.9);
border:1px solid rgba(100,180,120,0.2);
border-radius:14px 3px 14px 14px;
color:#d9ffd9;
}

.typing-wrap{
align-self:flex-start;
}

.typing{
display:inline-flex;
gap:5px;
padding:10px 14px;
background:rgba(24,30,42,0.9);
border:1px solid rgba(180,210,255,0.12);
border-radius:3px 14px 14px 14px;
}

.typing span{
width:6px;
height:6px;
border-radius:50%;
background:#8ae4ff;
animation:bounce .9s infinite;
}

.typing span:nth-child(2){
animation-delay:.15s;
}

.typing span:nth-child(3){
animation-delay:.3s;
}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

.input-area{
display:flex;
flex-direction:column;
gap:8px;
padding:12px;
background:rgba(10,12,18,0.96);
border-top:1px solid rgba(180,210,255,0.08);
}

.opciones-container {
display:grid;
grid-template-columns:1fr;
gap:8px;
width:100%;
}

@media(min-width: 600px){
  .opciones-container {
    grid-template-columns:1fr 1fr;
  }
}

.opcion-btn {
padding:12px 14px;
background:rgba(180,210,255,0.05);
border:1px solid rgba(180,210,255,0.15);
border-radius:6px;
color:#e2f1ff;
font-family:'Crimson Pro', serif;
font-size:14px;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.opcion-btn:hover:not(:disabled) {
background:rgba(180,210,255,0.15);
border-color:rgba(180,210,255,0.4);
}

.opcion-btn:disabled {
opacity:0.5;
cursor:not-allowed;
}

.footer{
text-align:center;
padding:5px;
font-size:11px;
color:rgba(180,210,255,0.25);
background:rgba(10,12,18,0.96);
}

.progreso-barra {
height:4px;
background:rgba(180,210,255,0.1);
width:100%;
position:relative;
}

.progreso-llenado {
height:100%;
background:linear-gradient(90deg,#8ae4ff,#769eff);
width:0%;
transition:width 0.3s ease;
}
</style>
</head>

<body>

<div class="luz"></div>
<div class="luz"></div>

<div class="container">

<div class="header">
<div class="header-row">
<div class="avatar">🤖</div>
<div class="header-info">
<h1>Validador de Lectura</h1>
<div class="header-sub">Control de Comprensión · Cuatro Estaciones</div>
</div>
<div class="zona" id="estacion-tag">ESTACIÓN 1 / 4</div>
</div>
<div class="frase" id="frase-dinamica">
"La memoria es el único rastro que queda cuando la historia intenta borrar los hechos."
</div>
</div>

<div class="progreso-barra">
<div class="progreso-llenado" id="barra"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<div class="opciones-container" id="opciones-block">
<!-- Los botones de opciones múltiples se inyectarán aquí dinámicamente -->
</div>
</div>

<div class="footer">
Evidencia de Aprendizaje — Sistema de Control Narrativo
</div>

</div>

<script>
const chat = document.getElementById("chat");
const opcionesBlock = document.getElementById("opciones-block");
const barra = document.getElementById("barra");
const estacionTag = document.getElementById("estacion-tag");

let estacionActual = 0;
let frasesRecolectadas = [];

// Las 4 preguntas basadas estrictamente en las 4 páginas del documento proveído
const bancoPreguntas = [
  {
    pregunta: "Estación 1: ¿A qué se dedicaba Frank Rodríguez y cuál era su gran anhelo profesional según el inicio del relato?",
    opciones: [
      { inciso: "A", texto: "Era un graduado de abogacía que trabajaba de mensajero en un banco.", correcta: false },
      { inciso: "B", texto: "Era estudiante de Derecho en octavo semestre, trabajaba apoyando procesos en el Palacio y anhelaba ser magistrado.", correcta: true },
      { inciso: "C", texto: "Era un periodista de la Corte Suprema que investigaba violaciones de derechos humanos.", correcta: false },
      { inciso: "D", texto: "Era conductor asignado de los altos magistrados de la Corte.", correcta: false }
    ],
    frasePremio: "«Un hilo de humo negro ascendía desde el centro de la ciudad...»"
  },
  {
    pregunta: "Estación 2: Cuando Adela se entera por los medios de comunicación del caos en el Palacio de Justicia, ¿qué decide hacer inmediatamente movida por el presentimiento?",
    opciones: [
      { inciso: "A", texto: "Se queda en la casa esperando llamadas telefónicas de los compañeros de Frank.", correcta: false },
      { inciso: "B", texto: "Apaga la televisión para que los gemelos Miguel y Alex no se asusten con las imágenes.", correcta: false },
      { inciso: "C", texto: "Busca a los niños al colegio, regresa a casa, organiza el lugar y enciende la televisión y la radio.", correcta: true },
      { inciso: "D", texto: "Viaja de inmediato a Chía a pedirle ayuda a la abuela Carmen.", correcta: false }
    ],
    frasePremio: "«...dejando una profunda e insoportable impotencia en las almas...»"
  },
  {
    pregunta: "Estación 3: Tras la toma, Adela logra ingresar al Palacio de Justicia devastado. ¿Qué elemento crucial intenta rescatar antes de ser detenida por un policía?",
    opciones: [
      { inciso: "A", texto: "Una máquina de escribir carbonizada.", correcta: false },
      { inciso: "B", texto: "Un maletín colgante de cuero que siempre usaba Frank.", correcta: true },
      { inciso: "C", texto: "Un listado oficial de las víctimas rescatadas.", correcta: false },
      { inciso: "D", texto: "Un par de anteojos y un rosario abandonado.", correcta: false }
    ],
    frasePremio: "«...donde la incertidumbre y el dolor se vuelven ceniza...»"
  },
  {
    pregunta: "Estación 4: Semanas después de la desaparición, mientras la familia vive la angustia en su hogar, ¿qué desastre natural de magnitudes históricas ocurre en el país y es seguido por los gemelos en el atlas?",
    opciones: [
      { inciso: "A", texto: "Un terremoto en el sur del país que destruyó las carreteras principales.", correcta: false },
      { inciso: "B", texto: "Las inundaciones provocadas por el desborde del río Bogotá.", correcta: false },
      { inciso: "C", texto: "La erupción del volcán Nevado del Ruiz que afectó gravemente a Armero.", correcta: true },
      { inciso: "D", texto: "Un fuerte invierno que incomunicó por completo el municipio de Chía.", correcta: false }
    ],
    frasePremio: "«...unidos por la tragedia de un mes para olvidar.»"
  }
];

function agregarMensaje(texto, tipo){
  const div = document.createElement("div");
  div.classList.add("mensaje", tipo);
  div.innerHTML = texto.replace(/\n/g, "<br>");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping(callback){
  const wrap = document.createElement("div");
  wrap.classList.add("typing-wrap");
  wrap.id = "typing";
  wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  
  setTimeout(() => {
    const t = document.getElementById("typing");
    if(t) t.remove();
    callback();
  }, 1000);
}

function cargarEstacion() {
  if (estacionActual < bancoPreguntas.length) {
    estacionTag.innerText = `ESTACIÓN ${estacionActual + 1} / 4`;
    barra.style.width = `${(estacionActual / bancoPreguntas.length) * 100}%`;
    
    const configuracion = bancoPreguntas[estacionActual];
    
    mostrarTyping(() => {
      agregarMensaje(configuracion.pregunta, "ia");
      renderizarOpciones(configuracion.opciones);
    });
  } else {
    // Fin del juego - Consolidación de frases
    estacionTag.innerText = "VERIFICADO";
    barra.style.width = "100%";
    opcionesBlock.innerHTML = "";
    
    mostrarTyping(() => {
      agregarMensaje("✨ ¡Has completado las 4 estaciones de lectura con éxito! Aquí tienes tus fragmentos recolectados:", "ia");
      
      let mensajeFinal = frasesRecolectadas.map((f, index) => `${index + 1}. ${f}`).join("\n\n");
      
      setTimeout(() => {
        agregarMensaje(mensajeFinal, "ia");
        setTimeout(() => {
          agregarMensaje("🔒 **EVIDENCIA DE LECTURA COMPLETA:** Muestra esta pantalla a tu profesor para validar que has comprendido el texto a la perfección.", "ia");
        }, 800);
      }, 500);
    });
  }
}

function renderizarOpciones(opciones) {
  opcionesBlock.innerHTML = "";
  opciones.forEach(opc => {
    const boton = document.createElement("button");
    boton.classList.add("opcion-btn");
    boton.innerHTML = `<strong>${opc.inciso}.</strong> ${opc.texto}`;
    boton.onclick = () => procesarRespuesta(opc);
    opcionesBlock.appendChild(boton);
  });
}

function procesarRespuesta(opcionSeleccionada) {
  // Desactivar botones momentáneamente
  const botones = opcionesBlock.querySelectorAll(".opcion-btn");
  botones.forEach(b => b.disabled = true);

  // Añadir la respuesta elegida por el usuario en pantalla
  agregarMensaje(`Elegí la opción ${opcionSeleccionada.inciso}: ${opcionSeleccionada.texto}`, "usuario");

  const configActual = bancoPreguntas[estacionActual];

  if (opcionSeleccionada.correcta) {
    mostrarTyping(() => {
      agregarMensaje(`🟢 ¡Correcto! Has desbloqueado una frase del libro para tu informe final:\n"${configActual.frasePremio}"`, "ia");
      frasesRecolectadas.push(configActual.frasePremio);
      estacionActual++;
      setTimeout(cargarEstacion, 1500);
    });
  } else {
    mostrarTyping(() => {
      agregarMensaje("🔴 Esa respuesta no coincide exactamente con los acontecimientos narrados en la lectura. Revisa el texto e inténtalo nuevamente.", "ia");
      // Reactivar opciones para que vuelva a intentar
      setTimeout(() => {
        renderizarOpciones(configActual.opciones);
      }, 1000);
    });
  }
}

// Inicialización del sistema al cargar la página
window.addEventListener("load", () => {
  mostrarTyping(() => {
    agregarMensaje("Hola. Soy tu asistente de control de lectura. Para verificar que has leído y comprendido a fondo el texto sobre Frank Rodríguez, la toma del Palacio de Justicia y los sucesos de 1985, te guiaré a través de 4 estaciones de preguntas de opción múltiple. ¡Comenzamos!", "ia");
    setTimeout(cargarEstacion, 1500);
  });
});
</script>

</body>
</html>
