<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elías — Control de Lectura</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090d14;
font-family:'Crimson Pro', serif;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.luz{
position:fixed;
border-radius:50%;
pointer-events:none;
z-index:0;
animation:flotar 7s ease-in-out infinite;
}

.luz:nth-child(1){
width:220px;
height:220px;
top:-40px;
left:-20px;
background:radial-gradient(circle, rgba(100,170,255,0.12) 0%, transparent 70%);
}

.luz:nth-child(2){
width:180px;
height:180px;
bottom:-30px;
right:-20px;
background:radial-gradient(circle, rgba(180,220,255,0.08) 0%, transparent 70%);
animation-delay:3s;
}

@keyframes flotar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-18px);}
}

.container{
width:min(860px,98vw);
height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(180deg,#0f1722 0%,#121c28 100%);
position:relative;
z-index:1;
}

.header{
padding:12px 18px;
background:linear-gradient(135deg,#172638 0%,#24394d 100%);
border-bottom:2px solid rgba(180,220,255,0.15);
}

.header-row{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-family:'Playfair Display', serif;
font-size:18px;
font-weight:bold;
background:linear-gradient(135deg,#7bb7ff,#b7dcff);
color:#0f1722;
box-shadow:0 0 0 2px rgba(180,220,255,0.15);
}

.header-info{
flex:1;
}

.header-info h1{
font-family:'Playfair Display', serif;
font-size:18px;
color:#e4f2ff;
}

.header-sub{
font-size:11px;
color:rgba(220,240,255,0.6);
letter-spacing:.08em;
text-transform:uppercase;
}

.zona{
font-size:10px;
padding:4px 10px;
border:1px solid rgba(180,220,255,0.2);
border-radius:3px;
color:rgba(220,240,255,0.7);
}

.frase{
margin-top:8px;
font-style:italic;
font-size:13px;
color:rgba(220,240,255,0.55);
border-left:2px solid rgba(180,220,255,0.25);
padding-left:10px;
line-height:1.5;
}

.chat{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:14px;
}

.chat::-webkit-scrollbar{
width:4px;
}

.chat::-webkit-scrollbar-thumb{
background:rgba(180,220,255,0.18);
}

.mensaje{
max-width:84%;
padding:13px 16px;
line-height:1.8;
font-size:15px;
animation:aparecer .25s ease;
}

@keyframes aparecer{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.ia{
align-self:flex-start;
background:rgba(22,35,50,0.92);
border:1px solid rgba(180,220,255,0.1);
border-radius:3px 14px 14px 14px;
color:#e6f3ff;
}

.usuario{
align-self:flex-end;
background:rgba(20,45,28,0.9);
border:1px solid rgba(100,180,120,0.2);
border-radius:14px 3px 14px 14px;
color:#d9ffd9;
}

.typing-wrap{
align-self:flex-start;
}

.typing{
display:inline-flex;
gap:5px;
padding:10px 14px;
background:rgba(22,35,50,0.92);
border:1px solid rgba(180,220,255,0.1);
border-radius:3px 14px 14px 14px;
}

.typing span{
width:6px;
height:6px;
border-radius:50%;
background:#9bc9ff;
animation:bounce .9s infinite;
}

.typing span:nth-child(25){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

.input-area{
display:flex;
flex-direction:column;
gap:8px;
padding:12px;
background:rgba(12,18,28,0.96);
border-top:1px solid rgba(180,220,255,0.08);
}

.opciones-container {
display:grid;
grid-template-columns:1fr;
gap:8px;
width:100%;
}

@media(min-width: 600px){
  .opciones-container {
    grid-template-columns:1fr 1fr;
  }
}

.opcion-btn {
padding:12px 14px;
background:rgba(180,220,255,0.05);
border:1px solid rgba(180,220,255,0.15);
border-radius:6px;
color:#eaf6ff;
font-family:'Crimson Pro', serif;
font-size:14px;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.opcion-btn:hover:not(:disabled) {
background:rgba(180,220,255,0.15);
border-color:rgba(180,220,255,0.4);
}

.opcion-btn:disabled {
opacity:0.5;
cursor:not-allowed;
}

.footer{
text-align:center;
padding:5px;
font-size:11px;
color:rgba(180,220,255,0.22);
background:rgba(12,18,28,0.96);
}

.progreso-barra {
height:4px;
background:rgba(180,220,255,0.1);
width:100%;
position:relative;
}

.progreso-llenado {
height:100%;
background:linear-gradient(90deg,#7bb7ff,#b7dcff);
width:0%;
transition:width 0.3s ease;
}
</style>
</head>

<body>

<div class="luz"></div>
<div class="luz"></div>

<div class="container">

<div class="header">
<div class="header-row">
<div class="avatar">⚽</div>
<div class="header-info">
<h1>Elías</h1>
<div class="header-sub">Control de Lectura · Bloque de Fútbol</div>
</div>
<div class="zona" id="estacion-tag">ESTACIÓN 1 / 2</div>
</div>
<div class="frase">
"Hay silencios que pesan más que cualquier confesión."
</div>
</div>

<div class="progreso-barra">
<div class="progreso-llenado" id="barra"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<div class="opciones-container" id="opciones-block">
<!-- Opciones dinámicas -->
</div>
</div>

<div class="footer">
Evidencia de Lectura — Sistema de Comprobación
</div>

</div>

<script>
const chat = document.getElementById("chat");
const opcionesBlock = document.getElementById("opciones-block");
const barra = document.getElementById("barra");
const estacionTag = document.getElementById("estacion-tag");

let estacionActual = 0;
let frasesRecolectadas = [];

const bancoPreguntas = [
  {
    pregunta: "Estación 1: En los diálogos de los niños sobre el fútbol colombiano, ¿cuál era el equipo de los amores de Frank y qué pretendían buscar los hermanos debajo de la cobija con una linterna?",
    opciones: [
      { inciso: "A", texto: "Frank era hincha de Millonarios y los niños buscaban un juguete perdido bajo la cama.", correcta: false },
      { inciso: "B", texto: "Frank era hincha de Santa Fe y los niños buscaban un cuaderno de religión.", correcta: false },
      { inciso: "C", texto: "Frank era un fiel hincha de Millonarios, y sus hijos Miguel y Alex buscaban ubicar a Armero en el atlas.", correcta: true },
      { inciso: "D", texto: "Frank apoyaba al Atlético Nacional y los niños buscaban una carta de recomendación.", correcta: false }
    ],
    frasePremio: "«Al buscar Armero en el atlas con enorme curiosidad, sus dedos golpearon el Tolima...»"
  },
  {
    pregunta: "Estación 2: Durante las transmisiones del programa deportivo radial conducido por Yamit y Jairo, ¿qué equipo daban como seguro campeón del torneo nacional y qué otra preocupación los embargaba?",
    opciones: [
      { inciso: "A", texto: "Daban como campeón al América de Cali dirigido por Gabriel Ochoa Uribe, mientras les preocupaba la situación del descenso.", correcta: false },
      { inciso: "B", texto: "Daban como seguro campeón al América de Cali de Ochoa Uribe, pero les perturbaba el partido de la selección ante Paraguay y la catástrofe del país.", correcta: true },
      { inciso: "C", texto: "Anunciaban la victoria del Deportivo Cali, preocupados por el pésimo estado de las canchas.", correcta: false },
      { inciso: "D", texto: "Celebraban el título de Junior de Barranquilla en medio de un fuerte invierno.", correcta: false }
    ],
    frasePremio: "«...mientras el balón rodaba en las predicciones, el eco del Palacio apagaba la paz de los hogares.»"
  }
];

function agregarMensaje(texto, tipo){
  const div = document.createElement("div");
  div.classList.add("mensaje", tipo);
  div.innerHTML = texto.replace(/\n/g, "<br>");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping(callback){
  const wrap = document.createElement("div");
  wrap.classList.add("typing-wrap");
  wrap.id = "typing";
  wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  
  setTimeout(() => {
    const t = document.getElementById("typing");
    if(t) t.remove();
    callback();
  }, 1000);
}

function cargarEstacion() {
  if (estacionActual < bancoPreguntas.length) {
    estacionTag.innerText = `ESTACIÓN ${estacionActual + 1} / 2`;
    barra.style.width = `${(estacionActual / bancoPreguntas.length) * 100}%`;
    
    const configuracion = bancoPreguntas[estacionActual];
    
    mostrarTyping(() => {
      agregarMensaje(configuracion.pregunta, "ia");
      renderizarOpciones(configuracion.opciones);
    });
  } else {
    estacionTag.innerText = `COMPLETO`;
    barra.style.width = "100%";
    opcionesBlock.innerHTML = "";
    
    mostrarTyping(() => {
      agregarMensaje("⚽ ¡Excelente análisis táctico de la lectura! Aquí están tus fragmentos deportivos recolectados:", "ia");
      
      let mensajeFinal = frasesRecolectadas.map((f, index) => `${index + 1}. ${f}`).join("\n\n");
      
      setTimeout(() => {
        agregarMensaje(mensajeFinal, "ia");
        setTimeout(() => {
          agregarMensaje("🔒 **EVIDENCIA REGISTRADA:** Muestra este resultado final a tu profesor para validar tu lectura.", "ia");
        }, 800);
      }, 500);
    });
  }
}

function renderizarOpciones(opciones) {
  opcionesBlock.innerHTML = "";
  opciones.forEach(opc => {
    const boton = document.createElement("button");
    boton.classList.add("opcion-btn");
    boton.innerHTML = `<strong>${opc.inciso}.</strong> ${opc.texto}`;
    boton.onclick = () => procesarRespuesta(opc);
    opcionesBlock.appendChild(boton);
  });
}

function procesarRespuesta(opcionSeleccionada) {
  const botones = opcionesBlock.querySelectorAll(".opcion-btn");
  botones.forEach(b => b.disabled = true);

  agregarMensaje(`Elegí la opción ${opcionSeleccionada.inciso}: ${opcionSeleccionada.texto}`, "usuario");

  const configActual = bancoPreguntas[estacionActual];

  if (opcionSeleccionada.correcta) {
    mostrarTyping(() => {
      agregarMensaje(`🔵 ¡Golazo! Respuesta correcta. Sumas una frase clave:\n\n"${configActual.frasePremio}"`, "ia");
      frasesRecolectadas.push(configActual.frasePremio);
      estacionActual++;
      setTimeout(cargarEstacion, 1500);
    });
  } else {
    mostrarTyping(() => {
      agregarMensaje("❌ Entrada incorrecta. Esa opción no coincide con los debates de fútbol o las búsquedas en el atlas. ¡Intenta de nuevo!", "ia");
      setTimeout(() => {
        renderizarOpciones(configActual.opciones);
      }, 1000);
    });
  }
}

window.addEventListener("load", () => {
  mostrarTyping(() => {
    agregarMensaje("¡Hola! Soy Elías. Analicemos las jugadas clave de la lectura con estas 2 últimas estaciones enfocadas en los niños, las búsquedas del mapa y los reportes deportivos de la radio. ¡Selecciona con cuidado!", "ia");
    setTimeout(cargarEstacion, 1500);
  });
});
</script>

</body>
</html>
