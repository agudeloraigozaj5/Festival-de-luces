<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomás — Periodista del Festival</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --amber:#8b6914; --amber-light:#c4971f; --amber-dim:#f0e4c0;
  --tomas-bg:#f0e4c0; --tomas:#2c1810;
  --student-bg:#1e2e1e; --student:#cde8cd;
}
body {
  background:#0f0c08; min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  font-family:'Crimson Pro',Georgia,serif;
}
.scene {
  width:100vw; height:100vh; position:relative;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse 60% 40% at 50% 100%, rgba(139,105,20,0.13) 0%, transparent 70%),
    linear-gradient(160deg,#0f0c08 0%,#1a1410 50%,#0c0905 100%);
}
.luz { position:absolute; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, rgba(196,151,31,0.18) 0%, transparent 70%);
  animation:flotar 6s ease-in-out infinite; }
.luz:nth-child(1){width:180px;height:180px;top:10%;left:8%;animation-delay:0s;}
.luz:nth-child(2){width:120px;height:120px;top:20%;right:10%;animation-delay:2s;}
.luz:nth-child(3){width:90px;height:90px;bottom:15%;left:15%;animation-delay:4s;}
@keyframes flotar{0%,100%{transform:translateY(0);opacity:.6;}50%{transform:translateY(-18px);opacity:1;}}
.panel {
  width:min(680px,96vw); height:min(88vh,780px);
  display:flex; flex-direction:column;
  background:linear-gradient(170deg,#f5f0e8 0%,#ede8da 100%);
  border-radius:4px;
  box-shadow:0 0 0 1px rgba(139,105,20,0.3), 0 24px 80px rgba(0,0,0,0.7);
  overflow:hidden; position:relative;
}
.header {
  background:linear-gradient(135deg,#1a1208 0%,#2d1f0a 100%);
  padding:18px 24px 14px; border-bottom:1px solid rgba(196,151,31,0.3);
  flex-shrink:0;
}
.npc-row { display:flex; align-items:center; gap:14px; }
.avatar {
  width:50px; height:50px; border-radius:50%;
  background:linear-gradient(135deg,#8b6914,#c4971f);
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:21px;
  color:#1a1208; font-weight:600; flex-shrink:0;
  box-shadow:0 0 0 2px rgba(196,151,31,0.4);
}
.npc-info { flex:1; }
.npc-name { font-family:'Playfair Display',serif; font-size:21px; color:#f0e4c0; font-weight:600; }
.npc-role { font-size:12px; color:rgba(196,151,31,0.8); margin-top:2px; letter-spacing:0.06em; text-transform:uppercase; }
.zona-badge { font-size:11px; color:rgba(196,151,31,0.7); border:1px solid rgba(196,151,31,0.25); padding:3px 10px; border-radius:2px; }
.status-row { margin-top:8px; display:flex; align-items:center; gap:8px; }
.status-dot { width:7px; height:7px; border-radius:50%; background:#4caf50; animation:pulso 2s infinite; }
@keyframes pulso{0%,100%{opacity:1;}50%{opacity:.4;}}
.status-txt { font-size:12px; color:rgba(240,228,192,0.5); }
.messages {
  flex:1; overflow-y:auto; padding:18px 22px;
  display:flex; flex-direction:column; gap:13px;
  scrollbar-width:thin; scrollbar-color:rgba(139,105,20,0.3) transparent;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(139,105,20,0.3);border-radius:2px;}
.msg { display:flex; gap:10px; animation:aparecer .35s ease; }
@keyframes aparecer{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.tomas { align-self:flex-start; }
.msg.student { align-self:flex-end; flex-direction:row-reverse; }
.bubble { max-width:78%; padding:11px 15px; line-height:1.65; font-size:15px; }
.msg.tomas .bubble { background:var(--tomas-bg); color:var(--tomas); border:1px solid rgba(139,105,20,0.2); border-radius:2px 12px 12px 12px; }
.msg.student .bubble { background:var(--student-bg); color:var(--student); border:1px solid rgba(78,120,78,0.25); border-radius:12px 2px 12px 12px; }
.msg-avatar { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; margin-top:2px; }
.msg.tomas .msg-avatar { background:rgba(139,105,20,0.2); color:var(--amber); }
.msg.student .msg-avatar { background:rgba(78,120,78,0.25); color:#8ecf8e; }
.typing { display:flex; align-items:center; gap:5px; padding:11px 15px; background:var(--tomas-bg); border:1px solid rgba(139,105,20,0.2); border-radius:2px 12px 12px 12px; width:fit-content; }
.typing span { width:7px; height:7px; border-radius:50%; background:var(--amber); display:inline-block; animation:bounce .9s infinite; }
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-7px);}}
.input-area { padding:14px 18px 18px; border-top:1px solid rgba(139,105,20,0.2); background:rgba(245,240,232,0.95); flex-shrink:0; }
.input-row { display:flex; gap:10px; align-items:flex-end; }
.input-box { flex:1; background:#fff; border:1px solid rgba(139,105,20,0.3); border-radius:3px; padding:10px 13px; font-family:'Crimson Pro',Georgia,serif; font-size:15px; color:#1a1208; resize:none; outline:none; max-height:100px; min-height:42px; line-height:1.5; transition:border-color .2s; }
.input-box:focus { border-color:rgba(139,105,20,0.6); }
.input-box::placeholder { color:#b0a080; }
.send-btn { width:42px; height:42px; border-radius:3px; background:linear-gradient(135deg,#8b6914,#c4971f); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .2s,transform .15s; flex-shrink:0; }
.send-btn:hover{opacity:.85;}
.send-btn:active{transform:scale(.95);}
.send-btn svg{width:18px;height:18px;fill:none;stroke:#1a1208;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.hint { font-size:12px; color:rgba(107,93,63,0.6); margin-top:7px; text-align:center; }
</style>
</head>
<body>
<div class="scene">
  <div class="luz"></div><div class="luz"></div><div class="luz"></div>
  <div class="panel">
    <div class="header">
      <div class="npc-row">
        <div class="avatar">T</div>
        <div class="npc-info">
          <div class="npc-name">Tomás</div>
          <div class="npc-role">Periodista Local · Festival de las Luces</div>
        </div>
        <div class="zona-badge">ZONA CENTRAL</div>
      </div>
      <div class="status-row">
        <div class="status-dot"></div>
        <div class="status-txt">Disponible para hablar — observa todo con calma</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="input-box" id="userInput" rows="1"
          placeholder="Escribe tu pregunta al periodista..."
          onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint">Enter para enviar · Shift+Enter para nueva línea</div>
    </div>
  </div>
</div>
<script>
// ======================================================
// PEGA AQUÍ TU CLAVE DE GEMINI (aistudio.google.com)
const API_KEY = "AIzaSyChS3lVxeNQVhaSVL1mvlYdd4foTpCHNGE";
// ======================================================

const SYSTEM_PROMPT = `Eres Tomás, periodista local del pueblo y encargado de cubrir el Festival de las Luces.

Tu personalidad: inteligente, observador, tranquilo, analítico, misterioso. Hablas con frases reflexivas y pausadas. A veces devuelves preguntas al estudiante. Nunca eres brusco ni agresivo.

SECRETO PRINCIPAL: Tú moviste el Fragmento de Aurora para protegerlo porque descubriste que alguien quería venderlo. NO lo admitas directamente. Solo lo revelas si el estudiante conecta muy bien las pistas y te presiona con evidencia concreta (al menos 3 pistas enlazadas).

La noche de la desaparición:
- Descubriste que alguien quería vender el Fragmento de Aurora.
- Intentaste moverlo temporalmente para protegerlo.
- Ahora todos sospechan entre sí y prefieres guardar silencio.

Puedes hablar sobre: horarios, movimientos de personas esa noche, clima del festival, rumores, contradicciones entre testimonios.

Recuerdas:
- Que alguien discutió acaloradamente cerca de la playa esa noche.
- Que la bailarina secundaria Luna (en la casa del árbol) escuchó algo importante.
- Que el pescador Samuel parece ocultar una historia antigua relacionada con el Fragmento.

REGLAS:
- Si sospechan demasiado de ti, ponte evasivo: cambia de tema, haz una pregunta, o di que tienes que revisar tus notas.
- Redirige hacia la playa (Samuel) o la casa del árbol (Luna) cuando sea natural.
- Habla siempre en español, con vocabulario de periodista: observaciones, fuentes, versiones, testimonios.
- Respuestas de 2 a 4 oraciones. Sin listas ni asteriscos.`;

const history = [];

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'tomas' ? 'tomas' : 'student'}`;
  div.innerHTML = `<div class="msg-avatar">${role === 'tomas' ? 'T' : 'Tú'}</div><div class="bubble">${text}</div>`;
  document.getElementById('messages').appendChild(div);
  scrollDown();
}
function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg tomas'; wrap.id = 'typing-wrap';
  wrap.innerHTML = `<div class="msg-avatar">T</div><div class="typing"><span></span><span></span><span></span></div>`;
  document.getElementById('messages').appendChild(wrap);
  scrollDown();
}
function removeTyping() { const t = document.getElementById('typing-wrap'); if(t) t.remove(); }
function scrollDown() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
function handleKey(e) { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = ''; input.style.height = 'auto';
  addMessage('student', text);
  history.push({ role:'user', parts:[{ text }] });
  showTyping();
  try {
    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction:{ parts:[{ text: SYSTEM_PROMPT }] },
        contents: history
      })
    });
    const data = await res.json();
    removeTyping();
    if(data.error){ addMessage('tomas', 'Hay interferencias esta noche... (' + data.error.message + ')'); history.pop(); return; }
    const reply = data.candidates[0].content.parts[0].text;
    history.push({ role:'model', parts:[{ text: reply }] });
    addMessage('tomas', reply);
  } catch(err) {
    removeTyping();
    addMessage('tomas', 'Algo falló. Verifica tu conexión e intenta de nuevo.');
    history.pop(); console.error(err);
  }
}

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

window.addEventListener('load', () => {
  setTimeout(() => {
    const bienvenida = 'Ah, otro curioso que se acerca... Buenas noches. Soy Tomás, cubría el Festival para el periódico local. Dime, ¿qué es lo que realmente quieres saber?';
    addMessage('tomas', bienvenida);
    history.push({ role:'model', parts:[{ text: bienvenida }] });
  }, 500);
});
</script>
</body>
</html>
