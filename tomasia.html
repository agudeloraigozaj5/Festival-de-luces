<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samuel — Control de Lectura</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07131a;
font-family:'Crimson Text', serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.fondo{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(0,120,160,.15), transparent 30%),
radial-gradient(circle at bottom right, rgba(0,80,120,.18), transparent 35%),
linear-gradient(to bottom,#07131a,#0d1f29,#07131a);
z-index:0;
}

.container{
width:min(900px,98vw);
height:100vh;
display:flex;
flex-direction:column;
position:relative;
z-index:2;
background:rgba(5,12,16,.92);
backdrop-filter:blur(4px);
border-left:1px solid rgba(120,180,220,.12);
border-right:1px solid rgba(120,180,220,.12);
}

.header{
padding:14px 18px;
border-bottom:1px solid rgba(120,180,220,.15);
background:rgba(8,18,24,.95);
}

.header-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.header-meta{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:linear-gradient(135deg,#1e5f7a,#6ca5bf);
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
color:#07131a;
font-family:'Cormorant Garamond', serif;
}

.header-info h1{
font-family:'Cormorant Garamond', serif;
font-size:24px;
font-weight:600;
color:#d9edf5;
}

.header-sub{
font-size:12px;
letter-spacing:.08em;
text-transform:uppercase;
color:rgba(180,220,235,.6);
}

.zona{
font-size:11px;
padding:4px 10px;
border:1px solid rgba(120,180,220,0.2);
border-radius:3px;
color:rgba(180,220,235,.7);
font-family:'Cormorant Garamond', serif;
}

.frase{
margin-top:8px;
padding-left:12px;
border-left:2px solid rgba(120,180,220,.3);
font-style:italic;
color:rgba(220,240,250,.65);
font-size:14px;
line-height:1.5;
}

.chat{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:14px;
}

.chat::-webkit-scrollbar{
width:4px;
}

.chat::-webkit-scrollbar-thumb{
background:rgba(120,180,220,0.18);
}

.mensaje{
max-width:84%;
padding:14px 16px;
line-height:1.8;
font-size:16px;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.ia{
align-self:flex-start;
background:rgba(14,28,36,.95);
border:1px solid rgba(120,180,220,.12);
border-radius:4px 14px 14px 14px;
color:#e2f3fa;
}

.usuario{
align-self:flex-end;
background:rgba(20,45,30,.9);
border:1px solid rgba(120,180,140,.18);
border-radius:14px 4px 14px 14px;
color:#e2ffe8;
}

.typing-wrap{
align-self:flex-start;
}

.typing{
display:inline-flex;
gap:5px;
padding:10px 14px;
background:rgba(14,28,36,.95);
border:1px solid rgba(120,180,220,.12);
border-radius:4px 14px 14px 14px;
}

.typing span{
width:6px;
height:6px;
border-radius:50%;
background:#6ca5bf;
animation:bounce .9s infinite;
}

.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

.input-area{
display:flex;
flex-direction:column;
gap:8px;
padding:12px;
border-top:1px solid rgba(120,180,220,.1);
background:rgba(5,10,14,.95);
}

.opciones-container {
display:grid;
grid-template-columns:1fr;
gap:8px;
width:100%;
}

@media(min-width: 600px){
  .opciones-container {
    grid-template-columns:1fr 1fr;
  }
}

.opcion-btn {
padding:12px 14px;
background:rgba(120,180,220,0.05);
border:1px solid rgba(120,180,220,0.15);
border-radius:6px;
color:#eaf6ff;
font-family:'Crimson Text', serif;
font-size:15px;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.opcion-btn:hover:not(:disabled) {
background:rgba(120,180,220,0.15);
border-color:rgba(120,180,220,0.4);
}

.opcion-btn:disabled {
opacity:0.5;
cursor:not-allowed;
}

.footer{
text-align:center;
padding:6px;
font-size:11px;
color:rgba(180,220,235,.35);
background:rgba(5,10,14,.95);
}

.progreso-barra {
height:4px;
background:rgba(120,180,220,0.1);
width:100%;
position:relative;
}

.progreso-llenado {
height:100%;
background:linear-gradient(90deg,#1e5f7a,#6ca5bf);
width:0%;
transition:width 0.3s ease;
}
</style>
</head>

<body>

<div class="fondo"></div>

<div class="container">

<div class="header">
<div class="header-row">
<div class="header-meta">
<div class="avatar">🌊</div>
<div class="header-info">
<h1>Samuel</h1>
<div class="header-sub">Control de Lectura · Bloque del Hogar</div>
</div>
</div>
<div class="zona" id="estacion-tag">ESTACIÓN 1 / 2</div>
</div>
<div class="frase">
"El agua recuerda cosas que las personas prefieren olvidar."
</div>
</div>

<div class="progreso-barra">
<div class="progreso-llenado" id="barra"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<div class="opciones-container" id="opciones-block">
</div>
</div>

<div class="footer">
Evidencia de Lectura — Sistema Sincronizado
</div>

</div>

<script>
const chat = document.getElementById("chat");
const opcionesBlock = document.getElementById("opciones-block");
const barra = document.getElementById("barra");
const estacionTag = document.getElementById("estacion-tag");

let estacionActual = 0;
let frasesRecolectadas = [];

const bancoPreguntas = [
  {
    pregunta: "Estación 1: En los recuerdos sobre la madre y las dinámicas en la mesa, ¿qué preparaba meticulosamente la señora de la casa y qué hacía la madre mientras los demás almorzaban o realizaban sus tareas?",
    opciones: [
      { inciso: "A", texto: "La señora de la casa preparaba jugos cítricos y la madre tejía en silencio en la sala.", correcta: false },
      { inciso: "B", texto: "La señora de la casa servía pescado frito mientras la madre leía la Biblia en voz alta.", correcta: false },
      { inciso: "C", texto: "La señora de la casa organizaba la mesa de noche, mientras la madre salía apresurada a la fábrica de textiles.", correcta: false },
      { inciso: "D", texto: "La señora de la casa preparaba jugos naturales quitándoles las pepas, mientras la madre subía al segundo piso a limpiar la máquina de escribir.", correcta: true }
    ],
    frasePremio: "«Las pepas de los jugos caían en el colador, igual que los viejos secretos de la casa...»"
  },
  {
    pregunta: "Estación 2: Con respecto a los días de mercado y el abastecimiento del hogar, ¿qué elemento guardaba con recelo la señora de la casa en la despensa y qué instrucciones específicas repetía constantemente sobre su uso?",
    opciones: [
      { inciso: "A", texto: "Guardaba arroz integral y exigía cocinarlo únicamente los domingos por la mañana.", correcta: false },
      { inciso: "B", texto: "Guardaba con recelo una botella de aceite de oliva español, advirtiendo que solo debía usarse en gotas contadas para las ensaladas especiales.", correcta: true },
      { inciso: "C", texto: "Ocultaba panela y pedía que nadie la tocara para evitar que los niños sufrieran de caries.", correcta: false },
      { inciso: "D", texto: "Almacenaba sal marina importada que únicamente se abría cuando Frank traía invitados de la capital.", correcta: false }
    ],
    frasePremio: "«Cada gota de aceite era contada con el rigor de un reloj de arena en medio de la cocina.»"
  }
];

function agregarMensaje(texto, tipo){
  const div = document.createElement("div");
  div.classList.add("mensaje", tipo);
  div.innerHTML = texto.replace(/\n/g, "<br>");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping(callback){
  const wrap = document.createElement("div");
  wrap.classList.add("typing-wrap");
  wrap.id = "typing";
  wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  
  setTimeout(() => {
    const t = document.getElementById("typing");
    if(t) t.remove();
    callback();
  }, 1000);
}

function cargarEstacion() {
  if (estacionActual < bancoPreguntas.length) {
    estacionTag.innerText = `ESTACIÓN ${estacionActual + 1} / 2`;
    barra.style.width = `${(estacionActual / bancoPreguntas.length) * 100}%`;
    
    const configuracion = bancoPreguntas[estacionActual];
    
    mostrarTyping(() => {
      agregarMensaje(configuracion.pregunta, "ia");
      renderizarOpciones(configuracion.opciones);
    });
  } else {
    estacionTag.innerText = `COMPLETO`;
    barra.style.width = "100%";
    opcionesBlock.innerHTML = "";
    
    mostrarTyping(() => {
      agregarMensaje("🌊 ¡Las corrientes de la memoria están despejadas! Has completado el último bloque de lectura. Tus fragmentos recolectados:", "ia");
      
      let mensajeFinal = frasesRecolectadas.map((f, index) => `${index + 1}. ${f}`).join("\n\n");
      
      setTimeout(() => {
        agregarMensaje(mensajeFinal, "ia");
        setTimeout(() => {
          agregarMensaje("🔒 **COMPROBACIÓN FINALIZADA:** Muestra el resultado de los 4 códigos a tu profesor para tu nota completa.", "ia");
        }, 800);
      }, 500);
    });
  }
}

function renderizarOpciones(opciones) {
  opcionesBlock.innerHTML = "";
  opciones.forEach(opc => {
    const boton = document.createElement("button");
    boton.classList.add("opcion-btn");
    boton.innerHTML = `<strong>${opc.inciso}.</strong> ${opc.texto}`;
    boton.onclick = () => procesarRespuesta(opc);
    opcionesBlock.appendChild(boton);
  });
}

function procesarRespuesta(opcionSeleccionada) {
  const botones = opcionesBlock.querySelectorAll(".opcion-btn");
  botones.forEach(b => b.disabled = true);

  agregarMensaje(`Elegí la opción ${opcionSeleccionada.inciso}: ${opcionSeleccionada.texto}`, "usuario");

  const configActual = bancoPreguntas[estacionActual];

  if (opcionSeleccionada.correcta) {
    mostrarTyping(() => {
      agregarMensaje(`🔵 El agua no miente. Respuesta correcta. Recibes un testimonio clave:\n\n"${configActual.frasePremio}"`, "ia");
      frasesRecolectadas.push(configActual.frasePremio);
      estacionActual++;
      setTimeout(cargarEstacion, 1500);
    });
  } else {
    mostrarTyping(() => {
      agregarMensaje("❌ El reflejo del agua muestra un error. Ese detalle no coincide con los recuerdos de la despensa o de la mesa. ¡Prueba otra opción!", "ia");
      setTimeout(() => {
        renderizarOpciones(configActual.opciones);
      }, 1000);
    });
  }
}

window.addEventListener("load", () => {
  mostrarTyping(() => {
    agregarMensaje("Soy Samuel. Las respuestas profundas tardan en llegar, pero con estas últimas 2 estaciones desvelaremos los detalles finales del hogar de Frank, la cocina y los misterios familiares. Elige sabiamente.", "ia");
    setTimeout(cargarEstacion, 1500);
  });
});
</script>

</body>
</html>
