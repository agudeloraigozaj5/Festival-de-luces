<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tomás — Periodista</title>

<style>

body{
    margin:0;
    padding:0;
    background:#081120;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    max-width:950px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#0b1730;
}

.header{
    padding:20px;
    background:#16233f;
    border-bottom:3px solid #facc15;
}

.header h1{
    margin:0;
    color:#facc15;
    font-size:34px;
}

.header p{
    color:#dbeafe;
    line-height:1.7;
    margin-top:10px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.mensaje{
    max-width:85%;
    padding:18px;
    border-radius:18px;
    line-height:1.8;
    font-size:17px;
}

.ia{
    background:#374151;
    align-self:flex-start;
    border-left:5px solid #facc15;
}

.usuario{
    background:#2563eb;
    align-self:flex-end;
}

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    background:#facc15;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#eab308;
}

.footer{
    text-align:center;
    padding:10px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>📰 Tomás — Periodista del pueblo</h1>

<p>
“La verdad rara vez aparece completa desde el principio.”
</p>

</div>

<div class="chat" id="chat">

<div class="mensaje ia">

He estado investigando la desaparición del Fragmento de Aurora.<br><br>

Puedes preguntarme sobre:
<ul>
<li>playa</li>
<li>lago</li>
<li>Valeria</li>
<li>Elías</li>
<li>miedo</li>
<li>Fragmento</li>
</ul>

</div>

</div>

<div class="input-area">
<input type="text" id="pregunta" placeholder="Haz una pregunta...">
<button onclick="enviarPregunta()">Enviar</button>
</div>

<div class="footer">
Festival de las Luces — Investigación Narrativa
</div>

</div>

<script>

const chat = document.getElementById("chat");

function agregarMensaje(texto,tipo){

    const div = document.createElement("div");

    div.classList.add("mensaje");
    div.classList.add(tipo);

    div.innerHTML = texto;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function enviarPregunta(){

    const input = document.getElementById("pregunta");

    const textoOriginal = input.value.trim();

    const texto = textoOriginal.toLowerCase();

    if(texto === "") return;

    agregarMensaje(textoOriginal,"usuario");

    input.value = "";

    let respuesta = "";

/* PLAYA */

if(
texto.includes("playa") ||
texto.includes("arena") ||
texto.includes("orilla") ||
texto.includes("mar")
){

respuesta = `La playa estaba rara esa noche, y eso me inquietó desde el principio. Yo conozco ese sonido de siempre, las olas, las risas lejanas, los niños corriendo sobre la arena… pero en algún momento todo eso desapareció y quedó un silencio que no me gustó nada.<br><br>

Vi una figura correr, eso sí lo vi con mis propios ojos. Cargaba algo bajo el brazo y se detenía cada tres pasos para mirar hacia atrás.<br><br>

La gente que mira hacia atrás así… tiene miedo de algo. O de alguien.`;

}

/* LAGO */

else if(
texto.includes("lago") ||
texto.includes("hielo") ||
texto.includes("agua")
){

respuesta = `El lago siempre fue mi lugar favorito del festival. El agua quieta, las linternas reflejadas, todo parecía más lento y más bonito ahí.<br><br>

Pero esa noche el hielo crujía de una manera que me ponía la piel de gallina.<br><br>

En un momento escuché algo romperse cerca de la orilla y todas las personas que estaban alrededor voltearon al mismo tiempo. Nadie dijo nada. Todos se miraron y siguieron caminando como si nada.<br><br>

Ese silencio compartido me asustó más que el sonido mismo.`;

}

/* VALERIA */

else if(
texto.includes("valeria") ||
texto.includes("bailarina")
){

respuesta = `Yo sé que esa noche no estaba bien y sé que todos lo notaron. Intenté concentrarme en la coreografía, en los pasos, en la música, pero mi cabeza estaba en otro lugar completamente.<br><br>

Seguía mirando hacia la zona central sin poder evitarlo, como si algo me dijera que prestara atención.<br><br>

Olvidé partes de la danza que llevo años practicando. Años.<br><br>

Y no fue por los nervios del escenario. Fue porque sentía que algo estaba a punto de pasar y no sabía cómo detenerlo.`;

}

/* ELIAS */

else if(
texto.includes("elias") ||
texto.includes("futbolista")
){

respuesta = `Elías tiene esa manera de pararse que hace pensar que nada lo afecta. Brazos cruzados, mandíbula apretada, mirada fija.<br><br>

Pero esa noche yo lo vi caminar solo cerca del hielo mucho después de que el festival había terminado para todos los demás.<br><br>

Manos en los bolsillos, sin prisa aparente, pero mirando constantemente hacia el lago.<br><br>

Cuando intenté acercarme no me miró a los ojos ni una sola vez.<br><br>

Las personas seguras de sí mismas te miran cuando hablan. Él no lo hizo.`;

}

/* MIEDO */

else if(
texto.includes("miedo") ||
texto.includes("nervios") ||
texto.includes("asustados")
){

respuesta = `Lo más extraño no fue el momento en que desapareció el Fragmento. Fue lo que vino después.<br><br>

El pueblo entero cambió en cuestión de minutos.<br><br>

Las conversaciones bajaron de volumen, las personas dejaron de mirarse, los grupos se separaron.<br><br>

El miedo hace eso, lo he visto otras veces, pero nunca tan rápido.<br><br>

Como si todos supieran instintivamente que hablar demasiado era peligroso.`;

}

/* FRAGMENTO */

else if(
texto.includes("fragmento") ||
texto.includes("aurora")
){

respuesta = `El Fragmento de Aurora no era solo bonito, era significativo.<br><br>

Cuando lo veías de cerca sentías que tenía peso, no solo físico sino… histórico.<br><br>

Como si cargara años y años de memorias del pueblo.<br><br>

Algunas personas lo veneraban, otras le tenían un respeto mezclado con miedo.<br><br>

Con el tiempo dejó de ser una reliquia del festival y se convirtió en algo que todos querían controlar.<br><br>

Y las cosas que todos quieren controlar terminan generando conflictos.`;

}

/* DEFAULT */

else{

respuesta = `A veces las respuestas importantes aparecen cuando haces preguntas más específicas.<br><br>

Puedes preguntarme sobre la playa, el lago, Valeria, Elías, el miedo del pueblo o el Fragmento de Aurora.`;

}

agregarMensaje(respuesta,"ia");

}

</script>

</body>
</html>
