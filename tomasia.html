<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomás IA - Periodista</title>

  <script src="https://js.puter.com/v2/"></script>

  <style>
    body{
      margin:0;
      padding:0;
      background:#081120;
      font-family:Arial,sans-serif;
      color:white;
    }

    .container{
      max-width:900px;
      margin:auto;
      height:100vh;
      display:flex;
      flex-direction:column;
      background:#0b1730;
    }

    .header{
      padding:20px;
      background:#16233f;
      border-bottom:2px solid #facc15;
    }

    .header h1{
      margin:0;
      color:#facc15;
      font-size:38px;
    }

    .header p{
      margin-top:10px;
      color:#e2e8f0;
      font-size:20px;
    }

    .chat{
      flex:1;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .mensaje{
      max-width:80%;
      padding:15px;
      border-radius:18px;
      line-height:1.6;
      font-size:18px;
    }

    .ia{
      background:#374151;
      align-self:flex-start;
      border-left:5px solid #facc15;
    }

    .usuario{
      background:#2563eb;
      align-self:flex-end;
    }

    .input-area{
      display:flex;
      padding:15px;
      background:#111827;
      gap:10px;
    }

    input{
      flex:1;
      padding:15px;
      border:none;
      border-radius:12px;
      font-size:17px;
    }

    button{
      background:#facc15;
      border:none;
      padding:15px 25px;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#eab308;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>📰 Tomás — Periodista del pueblo</h1>
    <p>
      “Toda historia tiene varias versiones… la difícil es descubrir cuál merece ser contada.”
    </p>
  </div>

  <div class="chat" id="chat">

    <div class="mensaje ia">
      Llegas justo cuando el pueblo empieza a desconfiar de todos.<br><br>

      Haz tus preguntas sobre la desaparición del Fragmento de Aurora.
    </div>

  </div>

  <div class="input-area">
    <input type="text" id="pregunta" placeholder="Haz una pregunta...">
    <button onclick="enviarPregunta()">Enviar</button>
  </div>

</div>

<script>

const chat = document.getElementById("chat");

async function enviarPregunta(){

  const input = document.getElementById("pregunta");
  const texto = input.value.trim();

  if(texto === "") return;

  agregarMensaje(texto,"usuario");

  input.value = "";

  try{

    const respuesta = await puter.ai.chat(`
Eres Tomás, el periodista del pueblo.

Tu personalidad:
- inteligente,
- observador,
- misterioso,
- analítico.

IMPORTANTE:
- Nunca reveles toda la verdad.
- Nunca digas directamente quién robó el Fragmento.
- Habla como una persona real.
- Mantén el misterio.
- Da pistas poco a poco.
- A veces duda.
- A veces sospecha de otros.
- Puedes redirigir estudiantes a:
  * Valeria,
  * Samuel,
  * Luna,
  * Elías.

Contexto:
La noche del Festival de las Luces desapareció el Fragmento de Aurora.

Lo que sabes:
- viste personas actuar extraño,
- alguien corrió hacia la playa,
- escuchaste discusiones,
- sospechas que varias personas ocultan cosas,
- alguien llevaba algo brillante.

IMPORTANTE:
- Describe emociones,
- ambiente,
- nerviosismo,
- clima,
- expresiones,
- sonidos.

Pregunta del estudiante:
${texto}

Responde como Tomás:
`);

    agregarMensaje(respuesta.message.content,"ia");

  }catch(error){

    agregarMensaje(
      "No pude responder en este momento... algo extraño está ocurriendo en el pueblo.",
      "ia"
    );

    console.log(error);
  }

}

function agregarMensaje(texto,tipo){

  const div = document.createElement("div");

  div.classList.add("mensaje");
  div.classList.add(tipo);

  div.innerHTML = texto.replace(/\n/g,"<br>");

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
