<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tomás — Periodista</title>

<style>

body{
    margin:0;
    padding:0;
    background:#081120;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    max-width:950px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#0b1730;
}

.header{
    padding:20px;
    background:#16233f;
    border-bottom:3px solid #facc15;
}

.header h1{
    margin:0;
    color:#facc15;
    font-size:34px;
}

.header p{
    color:#dbeafe;
    line-height:1.7;
    margin-top:10px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.mensaje{
    max-width:85%;
    padding:18px;
    border-radius:18px;
    line-height:1.8;
    font-size:17px;
}

.ia{
    background:#374151;
    align-self:flex-start;
    border-left:5px solid #facc15;
}

.usuario{
    background:#2563eb;
    align-self:flex-end;
}

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111827;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    background:#facc15;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#eab308;
}

.footer{
    text-align:center;
    padding:10px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>📰 Tomás — Periodista del pueblo</h1>

<p>
“La verdad rara vez aparece completa desde el principio.”
</p>

</div>

<div class="chat" id="chat">

<div class="mensaje ia">

He estado investigando la desaparición del Fragmento de Aurora.<br><br>

Puedes preguntarme sobre:
<ul>
<li>playa</li>
<li>lago</li>
<li>Valeria</li>
<li>Elías</li>
<li>miedo</li>
<li>Fragmento</li>
</ul>

</div>

</div>

<div class="input-area">
<input type="text" id="pregunta" placeholder="Haz una pregunta...">
<button onclick="enviarPregunta()">Enviar</button>
</div>

<div class="footer">
Festival de las Luces — Investigación Narrativa
</div>

</div>

<script>

const chat = document.getElementById("chat");

let preguntoPlaya = false;
let preguntoLago = false;
let preguntoValeria = false;
let preguntoElias = false;
let preguntoMiedo = false;
let preguntoFragmento = false;

function agregarMensaje(texto,tipo){

    const div = document.createElement("div");

    div.classList.add("mensaje");
    div.classList.add(tipo);

    div.innerHTML = texto;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function respuestaAleatoria(lista){
    return lista[Math.floor(Math.random() * lista.length)];
}

function enviarPregunta(){

    const input = document.getElementById("pregunta");

    const textoOriginal = input.value.trim();

    const texto = textoOriginal.toLowerCase();

    if(texto === "") return;

    agregarMensaje(textoOriginal,"usuario");

    input.value = "";

    let respuesta = "";

/* PLAYA */

if(
texto.includes("playa") ||
texto.includes("arena") ||
texto.includes("orilla")
){

preguntoPlaya = true;

respuesta = respuestaAleatoria([

`La playa estaba rara esa noche, y eso me inquietó desde el principio. Yo conozco ese sonido de siempre, las olas, las risas lejanas, los niños corriendo sobre la arena… pero en algún momento todo eso desapareció y quedó un silencio que no me gustó nada.<br><br>

Vi una figura correr, eso sí lo vi con mis propios ojos. Cargaba algo bajo el brazo y se detenía cada tres pasos para mirar hacia atrás.<br><br>

La gente que mira hacia atrás así… tiene miedo de algo. O de alguien.`,

`Siempre le reía a Samuel cuando decía que la playa guardaba secretos. Me parecía cosa de viejos, de personas que llevan demasiado tiempo solos mirando el agua.<br><br>

Pero esa noche… esa noche empecé a entenderlo.<br><br>

Las sombras cerca de la orilla se movían de una manera que no correspondía con el viento.<br><br>

Cuando un lugar se vacía así de rápido durante una fiesta, es porque alguien vio algo que no estaba listo para ver.`

]);

}

/* LAGO */

else if(
texto.includes("lago") ||
texto.includes("hielo")
){

preguntoLago = true;

respuesta = respuestaAleatoria([

`El lago siempre fue mi lugar favorito del festival. El agua quieta, las linternas reflejadas, todo parecía más lento y más bonito ahí.<br><br>

Pero esa noche el hielo crujía de una manera que me ponía la piel de gallina.<br><br>

Ese silencio compartido me asustó más que el sonido mismo.`,

`Samuel insiste en que el Fragmento nunca debió salir del lago.<br><br>

Había personas esa noche que no le tenían miedo a perder el Fragmento… le tenían miedo a lo que pudiera despertar si caía en manos equivocadas.`

]);

}

/* VALERIA */

else if(
texto.includes("valeria") ||
texto.includes("bailarina")
){

preguntoValeria = true;

respuesta = respuestaAleatoria([

`Yo sé que esa noche no estaba bien y sé que todos lo notaron.<br><br>

Intenté concentrarme en la coreografía, pero mi cabeza estaba en otro lugar completamente.<br><br>

Sentía que algo estaba a punto de pasar y no sabía cómo detenerlo.`,

`Hay noches que uno quisiera poder borrar de la memoria.<br><br>

Miraba hacia la playa, hacia los árboles, hacia el lago… como si mis ojos supieran dónde buscar antes de que mi cabeza lo entendiera.`

]);

}

/* ELIAS */

else if(
texto.includes("elias") ||
texto.includes("futbolista")
){

preguntoElias = true;

respuesta = respuestaAleatoria([

`Elías tiene esa manera de pararse que hace pensar que nada lo afecta.<br><br>

Pero esa noche yo lo vi caminar solo cerca del hielo mucho después de que el festival había terminado.`,

`Escuché su voz esa noche y no era la voz de alguien tranquilo.<br><br>

Después de esa discusión desapareció varios minutos y cuando volvió tenía la respiración agitada.`

]);

}

/* MIEDO */

else if(
texto.includes("miedo") ||
texto.includes("asustados")
){

preguntoMiedo = true;

respuesta = respuestaAleatoria([

`Lo más extraño no fue el momento en que desapareció el Fragmento. Fue lo que vino después.<br><br>

Las personas dejaron de mirarse y comenzaron a hablar en voz baja.`,

`El miedo no siempre grita.<br><br>

A veces susurra en los detalles pequeños, y esa noche el festival estaba lleno de esos susurros.`

]);

}

/* FRAGMENTO */

else if(
texto.includes("fragmento") ||
texto.includes("aurora")
){

preguntoFragmento = true;

respuesta = respuestaAleatoria([

`El Fragmento de Aurora no era solo bonito, era significativo.<br><br>

Con el tiempo dejó de ser una reliquia del festival y se convirtió en algo que todos querían controlar.`,

`Mientras más pienso en esa noche más me convenzo de que no todos querían robar el Fragmento.<br><br>

Había alguien que quería protegerlo.`

]);

}

/* CONEXIONES */

else if(
preguntoPlaya &&
preguntoLago
){

respuesta = `Entre la playa y el lago ocurrió algo importante aquella noche.<br><br>

Demasiadas personas iban y venían entre esos dos lugares.`

}

else{

respuesta = respuestaAleatoria([

`A veces las respuestas importantes aparecen cuando haces preguntas más específicas.`,

`Mientras más investigo, más siento que varias personas están ocultando pequeñas partes de la verdad.`

]);

}

agregarMensaje(respuesta,"ia");

}

</script>

</body>
</html>
