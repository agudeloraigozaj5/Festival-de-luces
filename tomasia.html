<script>

/* ========================= */
/* MEMORIA NARRATIVA */
/* ========================= */

let preguntoPlaya = false;
let preguntoLago = false;
let preguntoValeria = false;
let preguntoElias = false;
let preguntoMiedo = false;
let preguntoFragmento = false;

/* ========================= */
/* RESPUESTAS */
/* ========================= */

function generarRespuesta(texto){

texto = texto.toLowerCase();

let respuesta = "";

/* ========================= */
/* PLAYA */
/* ========================= */

if(
texto.includes("playa") ||
texto.includes("arena") ||
texto.includes("orilla") ||
texto.includes("mar")
){

preguntoPlaya = true;

respuesta = respuestaAleatoria([

`La playa estaba rara esa noche, y eso me inquietó desde el principio. Yo conozco ese sonido de siempre, las olas, las risas lejanas, los niños corriendo sobre la arena… pero en algún momento todo eso desapareció y quedó un silencio que no me gustó nada.<br><br>

Vi una figura correr, eso sí lo vi con mis propios ojos. Cargaba algo bajo el brazo y se detenía cada tres pasos para mirar hacia atrás.<br><br>

La gente que mira hacia atrás así… tiene miedo de algo. O de alguien.`,

`Siempre le reía a Samuel cuando decía que la playa guardaba secretos. Me parecía cosa de viejos, de personas que llevan demasiado tiempo solos mirando el agua.<br><br>

Pero esa noche… esa noche empecé a entenderlo.<br><br>

Las sombras cerca de la orilla se movían de una manera que no correspondía con el viento. Y las personas se alejaban de allá sin explicar por qué, como si algo las empujara sin tocarse.<br><br>

Cuando un lugar se vacía así de rápido durante una fiesta, es porque alguien vio algo que no estaba listo para ver.`

]);

}

/* ========================= */
/* LAGO */
/* ========================= */

else if(
texto.includes("lago") ||
texto.includes("hielo") ||
texto.includes("agua")
){

preguntoLago = true;

respuesta = respuestaAleatoria([

`El lago siempre fue mi lugar favorito del festival. El agua quieta, las linternas reflejadas, todo parecía más lento y más bonito ahí.<br><br>

Pero esa noche el hielo crujía de una manera que me ponía la piel de gallina.<br><br>

En un momento escuché algo romperse cerca de la orilla y todas las personas que estaban alrededor voltearon al mismo tiempo. Nadie dijo nada. Todos se miraron y siguieron caminando como si nada.<br><br>

Ese silencio compartido me asustó más que el sonido mismo.`,

`Samuel insiste en que el Fragmento nunca debió salir del lago. Antes lo escuchaba y pensaba que era un anciano aferrado a sus creencias.<br><br>

Pero después de esa noche empecé a preguntarme si quizás él sabe algo que los demás preferimos ignorar.<br><br>

Había personas esa noche que no le tenían miedo a perder el Fragmento… le tenían miedo a lo que pudiera despertar si caía en manos equivocadas.<br><br>

Eso es muy diferente. Y esa diferencia me sigue quitando el sueño.`

]);

}

/* ========================= */
/* VALERIA */
/* ========================= */

else if(
texto.includes("valeria") ||
texto.includes("bailarina")
){

preguntoValeria = true;

respuesta = respuestaAleatoria([

`Yo sé que esa noche no estaba bien y sé que todos lo notaron. Intenté concentrarme en la coreografía, en los pasos, en la música, pero mi cabeza estaba en otro lugar completamente.<br><br>

Seguía mirando hacia la zona central sin poder evitarlo, como si algo me dijera que prestara atención.<br><br>

Olvidé partes de la danza que llevo años practicando. Años.<br><br>

Y no fue por los nervios del escenario. Fue porque sentía que algo estaba a punto de pasar y no sabía cómo detenerlo.`,

`Hay noches que uno quisiera poder borrar de la memoria, no porque fueron terribles, sino porque te cambian algo adentro.<br><br>

Esa fue una de esas noches para mí.<br><br>

Miraba hacia la playa, hacia los árboles, hacia el lago… como si mis ojos supieran dónde buscar antes de que mi cabeza lo entendiera.<br><br>

Creo que vi algo importante. Creo que escuché algo importante.<br><br>

Lo que no sé todavía es si estoy lista para unir todas esas piezas en voz alta.`

]);

}

/* ========================= */
/* ELÍAS */
/* ========================= */

else if(
texto.includes("elias") ||
texto.includes("futbolista")
){

preguntoElias = true;

respuesta = respuestaAleatoria([

`Elías tiene esa manera de pararse que hace pensar que nada lo afecta. Brazos cruzados, mandíbula apretada, mirada fija.<br><br>

Pero esa noche yo lo vi caminar solo cerca del hielo mucho después de que el festival había terminado para todos los demás.<br><br>

Manos en los bolsillos, sin prisa aparente, pero mirando constantemente hacia el lago.<br><br>

Cuando intenté acercarme no me miró a los ojos ni una sola vez.<br><br>

Las personas seguras de sí mismas te miran cuando hablan. Él no lo hizo.`,

`Escuché su voz esa noche y no era la voz de alguien tranquilo.<br><br>

Era la voz de alguien que está perdiendo el control de una situación que él mismo creó.<br><br>

No pude entender las palabras exactas porque el viento se llevaba todo, pero el tono… ese tono no se olvida.<br><br>

Después de esa discusión desapareció varios minutos y cuando volvió tenía la respiración agitada y evitaba acercarse a ciertos lugares del festival.<br><br>

Algo pasó en esos minutos que él no ha contado.`

]);

}

/* ========================= */
/* MIEDO */
/* ========================= */

else if(
texto.includes("miedo") ||
texto.includes("nervios") ||
texto.includes("asustados")
){

preguntoMiedo = true;

respuesta = respuestaAleatoria([

`Lo más extraño no fue el momento en que desapareció el Fragmento. Fue lo que vino después.<br><br>

El pueblo entero cambió en cuestión de minutos.<br><br>

Las conversaciones bajaron de volumen, las personas dejaron de mirarse, los grupos se separaron.<br><br>

El miedo hace eso, lo he visto otras veces, pero nunca tan rápido.<br><br>

Como si todos supieran instintivamente que hablar demasiado era peligroso.`,

`Yo soy bailarina, estoy entrenada para leer cuerpos.<br><br>

Y esa noche los cuerpos de las personas decían cosas que sus bocas no se atrevían a pronunciar.<br><br>

Manos que temblaban levemente. Ojos que esquivaban. Sonrisas que no llegaban hasta los ojos.<br><br>

El miedo no siempre grita. A veces susurra en los detalles pequeños, y esa noche el festival estaba lleno de esos susurros.`

]);

}

/* ========================= */
/* FRAGMENTO */
/* ========================= */

else if(
texto.includes("fragmento") ||
texto.includes("aurora")
){

preguntoFragmento = true;

respuesta = respuestaAleatoria([

`El Fragmento de Aurora no era solo bonito, era significativo.<br><br>

Cuando lo veías de cerca sentías que tenía peso, no solo físico sino… histórico.<br><br>

Como si cargara años y años de memorias del pueblo.<br><br>

Algunas personas lo veneraban, otras le tenían un respeto mezclado con miedo.<br><br>

Con el tiempo dejó de ser una reliquia del festival y se convirtió en algo que todos querían controlar.<br><br>

Y las cosas que todos quieren controlar terminan generando conflictos.`,

`Mientras más pienso en esa noche más me convenzo de que no todos querían robar el Fragmento.<br><br>

Había alguien que quería venderlo, sí. Pero había otra persona que quería protegerlo.<br><br>

Eso me lo decía el instinto esa noche, dos intenciones completamente distintas moviéndose al mismo tiempo en el mismo lugar.<br><br>

Lo que no sé es cuál de las dos terminó ganando.<br><br>

Y eso es lo que más me preocupa.`

]);

}

/* ========================= */
/* CONEXIONES */
/* ========================= */

else if(
preguntoPlaya &&
preguntoLago
){

respuesta = `Entre la playa y el lago ocurrió algo importante aquella noche, estoy seguro.<br><br>

Demasiadas personas iban y venían entre esos dos lugares.<br><br>

Y lo extraño es que todas parecían actuar como si estuvieran escondiendo algo distinto.`

}

else if(
preguntoValeria &&
preguntoFragmento
){

respuesta = `Ahora que mencionas el Fragmento… creo que Valeria sabía más de lo que intentaba demostrar.<br><br>

No porque quisiera hacer daño, sino porque parecía realmente asustada de lo que podía pasar si ciertas personas encontraban ese objeto primero.`

}

else if(
preguntoElias &&
preguntoLago
){

respuesta = `Mientras más recuerdo a Elías cerca del hielo, más me convenzo de que estaba esperando a alguien.<br><br>

No parecía perdido. Parecía nervioso.<br><br>

Como alguien que sabía exactamente dónde debía estar.`

}

/* ========================= */
/* DEFAULT */
/* ========================= */

else{

respuesta = respuestaAleatoria([

`A veces las respuestas importantes aparecen cuando haces preguntas más específicas.`,

`Hay demasiadas versiones de esa noche circulando por el pueblo… y honestamente no sé cuál es la más peligrosa.`,

`Mientras más investigo, más siento que varias personas están ocultando pequeñas partes de la verdad.`

]);

}

return respuesta;
}

</script>
